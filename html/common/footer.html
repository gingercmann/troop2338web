<style>
  /* BREAKOUT: Forces the footer to ignore parent padding and hit the edges */
  .footer-wrapper {
    width: 100vw;
    position: relative;
    left: 50%;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
    background: #393636;
    border-top: 1px solid #ccc;
    box-sizing: border-box;
  }

  .custom-footer {
    color: #f0f0f0;
    text-align: center;
    font-size: 1.15rem; 
    max-width: 1200px;
    margin: 0 auto;
    padding: 3em 1em;
    box-sizing: border-box;
  }
  
  /* LOGO SECTION */
  .footer-logos {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 60px;
    margin-bottom: 2.5em;
    padding-bottom: 2.5em;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  /* Make the whole link block a flex container */
  .footer-logos a.logo-link {
    text-decoration: none !important;
    color: inherit !important;
    display: block;
    transition: transform 0.3s ease;
  }

  .footer-logos figure {
    margin: 0;
    max-width: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
  }

  .footer-logos img {
    width: auto;
    max-height: 110px;
    max-width: 100%;
    height: auto;
    display: block;
  }

  .footer-logos a.logo-link:hover {
    transform: scale(1.08);
  }
  
  .footer-logos a.logo-link:hover figcaption {
    color: #ffd700 !important;
  }

  .footer-logos figcaption {
    font-size: 0.9rem;
    margin-top: 12px;
    color: #f0f0f0;
    font-weight: 500;
    transition: color 0.3s ease;
  }

  .custom-footer p { margin: 0.75em 0; }

  .custom-footer a {
    color: #ffffff !important;
    text-decoration: underline;
  }
        
  .custom-footer a:hover {
    color: #ffd700 !important;
    text-decoration: none;
  }
  
  .custom-footer .social-links { margin-top: 2em; }
  
  .custom-footer .social-links a {
    margin: 0 1em;
    display: inline-block;
    width: 28px;
    height: 28px;
    text-decoration: none !important;
  }
  
  .custom-footer .social-links svg {
    width: 100%;
    height: 100%;
    fill: #ffffff;
    transition: transform 0.2s ease, fill 0.2s ease;
  }
  
  .custom-footer .social-links a:hover svg {
    transform: scale(1.2);
    fill: #ffd700;
  }

  @media (max-width: 900px) {
    .custom-footer { font-size: 1rem; padding: 2em 1em; }
    .footer-logos { gap: 25px; }
    .footer-logos img { max-height: 75px; }
    .footer-logos figcaption { font-size: 0.75rem; }
  }
</style>
